databases:
  - name: scalar-ag-db
    databaseName: scalar_ag
    user: scalar_user
    plan: free

services:
  - type: web
    name: scalar-ag-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scalar-ag-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
